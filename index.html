<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO Meta -->
    <title>TypeFlow - Learn Typing From Scratch | 从零开始学打字</title>
    <meta name="description" content="A free cross-platform typing practice app for beginners. 20 progressive levels, real keyboard required. | TypeFlow 是一款免费跨平台打字练习应用，支持 Windows、macOS、Linux、Android。适合零基础入门和进阶提高。" />
    <meta name="keywords" content="typing practice, learn typing, touch typing, typing tutor, keyboard practice, 打字练习, 打字学习, 指法练习, 键位练习, 盲打, 儿童打字" />
    <meta name="author" content="TypeFlow" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://typeflow.top/" />

    <!-- Open Graph -->
    <meta property="og:title" content="TypeFlow - Learn Typing From Scratch | 从零开始学打字" />
    <meta property="og:description" content="A free cross-platform typing practice app built for beginners. | 免费跨平台打字练习应用，专为入门学习者打造。" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://typeflow.top/" />
    <meta property="og:site_name" content="TypeFlow" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="TypeFlow - Learn Typing From Scratch | 从零开始学打字" />
    <meta name="twitter:description" content="A free cross-platform typing practice app. | 免费跨平台打字练习应用。" />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="shortcut icon" type="image/x-icon" href="/favicon.ico" />

    <!-- Preload -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Dynamic title based on saved language -->
    <script>
      (function() {
        const titles = {
          'zh-CN': 'TypeFlow - 从零开始学打字 | 跨平台打字练习应用',
          'zh-TW': 'TypeFlow - 從零開始學打字 | 跨平台打字練習應用',
          'en': 'TypeFlow - Learn Typing From Scratch | Free Typing Practice App',
        };
        try {
          // 从 localStorage 读取 app 存储的语言
          const raw = localStorage.getItem('typing-practice-v2');
          if (raw) {
            const data = JSON.parse(raw);
            const lang = data?.state?.settings?.language;
            if (lang && titles[lang]) {
              document.title = titles[lang];
            }
          } else {
            // fallback: 从 landing 自己的存储读
            const lang = localStorage.getItem('landing-lang');
            if (lang && titles[lang]) {
              document.title = titles[lang];
            }
          }
        } catch(e) { /* ignore */ }
      })();
    </script>
  </body>
</html>
